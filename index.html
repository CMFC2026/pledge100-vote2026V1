<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voting Pledge</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {font-family: Arial; background:#f5f7fb;}
.container {max-width:900px; margin:auto; padding:20px;}
.card {background:white; padding:20px; border-radius:12px;}
.grid {display:grid; grid-template-columns:1fr 1fr; gap:10px;}
input, select {padding:10px; border-radius:8px; border:1px solid #ccc; width:100%;}
button {padding:10px; border:none; border-radius:8px; cursor:pointer; margin:2px;}
.submit {background:#2ecc71; color:white; width:100%;}
.photo-box {border:1px dashed #ccc; padding:15px; border-radius:10px; text-align:center;}
.btn-upload {background:#eee;}
.btn-camera {background:#d4f5d4;}
#preview {margin-top:10px; width:100px; height:100px; border-radius:50%; object-fit:cover;}
.lang-btn {background:#ddd;}
</style>

</head>

<body>

<div class="container">

<div style="text-align:right;">
<button class="lang-btn" onclick="setLanguage('ta')">தமிழ்</button>
<button class="lang-btn" onclick="setLanguage('en')">English</button>
</div>

<h2 id="title">100% வாக்களிப்பு உறுதி</h2>

<div class="card">

<div class="grid">

<div>
<label id="lblDistrict">மாவட்டம்</label>
<select id="district">
<option value="Ramanathapuram">Ramanathapuram</option>
</select>
</div>

<div>
<label id="lblConstituency">தொகுதி</label>
<select id="constituency">
<option>Ramanathapuram</option>
<option>Paramakudi</option>
<option>Thiruvadanai</option>
<option>Muthukulathur</option>
</select>
</div>

<div>
<label id="lblName">பெயர்</label>
<input type="text" id="name" required>
</div>

<div>
<label id="lblPhone">தொலைபேசி எண்</label>
<input type="tel" id="phone" maxlength="10" required>
</div>

</div>

<br>

<div class="photo-box">
<p id="photoText">புகைப்படத்தை தேர்வு செய்யவும்</p>

<input type="file" id="uploadInput" accept="image/*" style="display:none">
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

<button class="btn-upload" onclick="uploadInput.click()">Upload File</button>
<button class="btn-camera" onclick="cameraInput.click()">Take Photo</button>

<br>
<img id="preview">
</div>

<br>

<button class="submit" onclick="submitForm()">Badge உருவாக்க</button>

</div>
</div>

<canvas id="canvas" width="400" height="400" style="display:none;"></canvas>

<script>

// 🌐 Language
function setLanguage(lang){
    document.getElementById("title").innerText =
        lang === "en" ? "Pledge of 100% Voting" : "100% வாக்களிப்பு உறுதி";

    document.getElementById("lblDistrict").innerText =
        lang === "en" ? "District" : "மாவட்டம்";
    
    document.getElementById("lblConstituency").innerText =
        lang === "en" ? "Constituency" : "தொகுதி";
    
    document.getElementById("lblName").innerText =
        lang === "en" ? "Name" : "பெயர்";
    
    document.getElementById("lblPhone").innerText =
        lang === "en" ? "Phone Number" : "தொலைபேசி எண்";
    
    document.getElementById("photoText").innerText =
        lang === "en" ? "Select Photo" : "புகைப்படத்தை தேர்வு செய்யவும்";
    
    document.querySelector(".btn-upload").innerText =
        lang === "en" ? "Upload File" : "கோப்பு பதிவேற்று";
    
    document.querySelector(".btn-camera").innerText =
        lang === "en" ? "Take Photo" : "புகைப்படம் எடு";
    
    document.querySelector(".submit").innerText =
        lang === "en" ? "Generate Badge" : "Badge உருவாக்க";
}

// 📱 Phone validation
function validatePhone(phone){
return /^[6-9][0-9]{9}$/.test(phone);
}

phone.oninput = function(){
this.value = this.value.replace(/[^0-9]/g,'');
}

// 📸 Preview
uploadInput.onchange = previewImage;
cameraInput.onchange = previewImage;

function previewImage(e){
let file = e.target.files[0];
if(!file) return;
let reader = new FileReader();
reader.onload = () => preview.src = reader.result;
reader.readAsDataURL(file);
}

function getFile(){
return uploadInput.files[0] || cameraInput.files[0];
}



function submitForm(){

let phone = document.getElementById("phone").value.trim();

if(!validatePhone(phone)){
alert("Valid 10 digit number enter pannunga");
return;
}

let file = getFile();
if(!file){
alert("Upload photo");
return;
}

// 🔥 COMPRESS IMAGE
let img = new Image();
let reader = new FileReader();

reader.onload = e => img.src = e.target.result;

img.onload = () => {

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

let maxWidth = 300;
let scale = maxWidth / img.width;

canvas.width = maxWidth;
canvas.height = img.height * scale;

ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

// 👉 compressed base64
let compressed = canvas.toDataURL("image/jpeg", 0.5).split(",")[1];

// 🚀 SEND DATA
fetch("https://script.google.com/macros/s/AKfycbxTvM26rVFQEvroOUmCEWk7dIcpMgBhvQD6_ixTLhDkxxhxKKvMTq0Nk-cNf1No-rE/exec", {
  method: "POST",
  mode: "no-cors",   // 🔥 important
  body: new URLSearchParams({
    name: name.value,
    phone: phone,
    district: "Ramanathapuram",
    constituency: constituency.value,
    photo: compressed
  })
})
.then(() => {
  // ✅ direct success (no-cors la response read panna mudiyathu)
  generateBadge(file);
})
.catch(() => {
  alert("Network error ❌");
});

};

reader.readAsDataURL(file);
}

// 🎫 Badge
function generateBadge(file){

    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    let bg = new Image();
    let user = new Image();
    let qr = new Image();

    bg.src="https://github.com/CMFC2026/pledge100-vote2026V1/blob/main/images/badge.png";
    user.src=URL.createObjectURL(file);
    qr.src="https://github.com/CMFC2026/pledge100-vote2026V1/blob/main/images/qr.png";

    Promise.all([
        new Promise(r=>bg.onload=r),
        new Promise(r=>user.onload=r),
        new Promise(r=>qr.onload=r)
    ]).then(()=>{

        // 🔹 Resize canvas to match badge image
        canvas.width = bg.width;
        canvas.height = bg.height;

        // 🔹 Draw badge background
        ctx.drawImage(bg,0,0,canvas.width,canvas.height);

        // 🔹 Draw circular profile photo
        let centerX = canvas.width/2;
        let centerY = canvas.height/2 - 20; // adjust vertical as needed
        let radius = 65;

        ctx.save();
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, Math.PI*2);
        ctx.clip();
        ctx.drawImage(user, centerX-radius, centerY-radius, radius*2, radius*2);
        ctx.restore();

        // 🔹 Draw text
        ctx.textAlign = "center";
        ctx.fillStyle = "#000"; // black text
        ctx.font = "16px Arial"; // adjust size as needed
        ctx.fillText(name.value, centerX, centerY + radius + 30);
        ctx.fillText(constituency.value, centerX, centerY + radius + 50);
        ctx.fillText("Ramanathapuram District", centerX, centerY + radius + 70);

        // 🔹 Draw QR code
        ctx.drawImage(qr, canvas.width-110, canvas.height-110, 90, 90);

        // 🔹 Download PDF
        downloadPDF(canvas);

    });

}

// 📄 PDF
function downloadPDF(canvas){

const { jsPDF } = window.jspdf;

let pdf = new jsPDF({unit:"mm",format:[100,100]});
pdf.addImage(canvas.toDataURL(),'PNG',0,0,100,100);
pdf.save("badge.pdf");

}

</script>

</body>
</html>
