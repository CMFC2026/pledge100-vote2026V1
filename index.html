<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voting Pledge</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {font-family: Arial; background:#f5f7fb;}
.container {max-width:900px; margin:auto; padding:20px;}
.card {background:white; padding:20px; border-radius:12px;}
.grid {display:grid; grid-template-columns:1fr 1fr; gap:10px;}
input, select {padding:10px; border-radius:8px; border:1px solid #ccc; width:100%;}
button {padding:10px; border:none; border-radius:8px; cursor:pointer; margin:5px;}
.submit {background:#2ecc71; color:white; width:100%;}
.download {background:#3498db; color:white;}
.photo-box {border:1px dashed #ccc; padding:15px; border-radius:10px; text-align:center;}
#preview {margin-top:10px; width:100px; height:100px; border-radius:50%;}
</style>
</head>

<body>

<div class="container">

<div style="text-align:right;">
<button onclick="setLanguage('ta')">தமிழ்</button>
<button onclick="setLanguage('en')">English</button>
</div>

<h2 id="title">100% வாக்களிப்பு உறுதி</h2>

<div class="card">

<div class="grid">

<div>
<label id="lblDistrict">மாவட்டம்</label>
<select id="district">
<option>Ramanathapuram</option>
</select>
</div>

<div>
<label id="lblConstituency">தொகுதி</label>
<select id="constituency">
<option>Ramanathapuram</option>
<option>Paramakudi</option>
<option>Thiruvadanai</option>
<option>Muthukulathur</option>
</select>
</div>

<div>
<label id="lblName">பெயர்</label>
<input type="text" id="name">
</div>

<div>
<label id="lblPhone">தொலைபேசி</label>
<input type="tel" id="phone" maxlength="10">
</div>

</div>

<br>

<div class="photo-box">
<input type="file" id="file" accept="image/*">
<img id="preview">
</div>

<br>

<button class="submit" onclick="submitForm()">Generate Badge</button>
<button class="download" onclick="downloadImage()">Download Image</button>

</div>
</div>

<canvas id="canvas" width="400" height="400" style="display:none;"></canvas>

<script>

let currentLang = "ta";

function setLanguage(lang){
currentLang = lang;

document.getElementById("title").innerText =
lang==="en" ? "Pledge of 100% Voting" : "100% வாக்களிப்பு உறுதி";

document.getElementById("lblName").innerText =
lang==="en" ? "Name" : "பெயர்";

document.getElementById("lblPhone").innerText =
lang==="en" ? "Phone" : "தொலைபேசி";
}

// preview
file.onchange = e=>{
let reader = new FileReader();
reader.onload = ()=> preview.src = reader.result;
reader.readAsDataURL(e.target.files[0]);
};

function submitForm(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let constituency = document.getElementById("constituency").value;
let fileInput = document.getElementById("file").files[0];

if(!name || !phone || !fileInput){
alert("Fill all fields");
return;
}

// compress
let reader = new FileReader();
reader.onload = e=>{

let base64 = e.target.result.split(",")[1];

// send to sheet
fetch("YOUR_GOOGLE_SCRIPT_URL", {
method:"POST",
body: new URLSearchParams({
name:name,
phone:phone,
constituency:constituency,
photo:base64
})
});

generateBadge(e.target.result);

};
reader.readAsDataURL(fileInput);
}

function generateBadge(imgData){

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let bg = new Image();
let user = new Image();

bg.src="https://raw.githubusercontent.com/CMFC2026/pledge100-vote2026V1/main/images/badge.png";
user.src=imgData;

Promise.all([
new Promise(r=>bg.onload=r),
new Promise(r=>user.onload=r)
]).then(()=>{

ctx.drawImage(bg,0,0,400,400);

// circle photo
ctx.save();
ctx.beginPath();
ctx.arc(200,200,70,0,Math.PI*2);
ctx.clip();
ctx.drawImage(user,130,130,140,140);
ctx.restore();

// text
ctx.fillStyle="black";
ctx.textAlign="center";
ctx.font="bold 16px Arial";

ctx.fillText(document.getElementById("name").value,200,300);
ctx.fillText(document.getElementById("constituency").value,200,320);

});
}

function downloadImage(){
let canvas = document.getElementById("canvas");
let link = document.createElement("a");
link.download = "badge.png";
link.href = canvas.toDataURL();
link.click();
}

</script>

</body>
</html>
